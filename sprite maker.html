<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extracteur de Sprites - Chroma Key Anti-Frange</title>
    <style>
        body {
            background: #121212;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; color: #ffcc00; }
        .controls {
            background: #1e1e1e;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        label { font-size: 13px; display: block; margin-bottom: 3px; color: #aaa; }
        input[type="number"], select {
            padding: 6px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            text-align: center;
        }
        input[type="file"] {
            background: #2a2a2a;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #e6b800; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }

        #preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 1100px;
            margin-top: 20px;
        }
        .sprite-card {
            background: #1e1e1e;
            border: 2px dashed #444;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            background-image: linear-gradient(45deg, #2a2a2a 25%, transparent 25%), 
                              linear-gradient(-45deg, #2a2a2a 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #2a2a2a 75%), 
                              linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }
        .sprite-card canvas {
            display: block;
            margin: 0 auto 8px auto;
            background: transparent;
        }
        .sprite-card button {
            font-size: 12px;
            padding: 5px 10px;
            background: #3498db;
            color: white;
        }
        .sprite-card button:hover { background: #2980b9; }
        #canvas-source { display: none; }
        .pixel-inputs { display: none; gap: 10px; }
    </style>
</head>
<body>

    <h1>Extracteur Strict (Anti-Contour Vert)</h1>
    
    <div class="controls">
        <div>
            <label for="imageInput">Spritesheet PNG :</label>
            <input type="file" id="imageInput" accept="image/png, image/jpeg">
        </div>

        <div>
            <label for="splitMode">Mode de calcul :</label>
            <select id="splitMode">
                <option value="grid">Grille (Cols x Lignes)</option>
                <option value="pixel">Dimension (Px x Px)</option>
            </select>
        </div>

        <div>
            <label for="cols">Colonnes :</label>
            <input type="number" id="cols" value="6" style="width: 60px;">
        </div>

        <div>
            <label for="rows">Lignes :</label>
            <input type="number" id="rows" value="6" style="width: 60px;">
        </div>

        <div id="pixelControls" class="pixel-inputs">
            <div>
                <label for="spriteW">Largeur (px) :</label>
                <input type="number" id="spriteW" value="200" style="width: 65px;">
            </div>
            <div>
                <label for="spriteH">Hauteur (px) :</label>
                <input type="number" id="spriteH" value="200" style="width: 65px;">
            </div>
        </div>

        <div>
            <label for="greenMode">Nettoyer fond vert :</label>
            <select id="greenMode">
                <option value="true">Oui (Supprimer + Anti-Frange)</option>
                <option value="false">Non</option>
            </select>
        </div>

        <div>
            <label for="trimMode">Rogner vide :</label>
            <select id="trimMode">
                <option value="false">Non</option>
                <option value="true">Oui</option>
            </select>
        </div>

        <div>
            <label>&nbsp;</label>
            <button id="extractBtn" disabled>Extraire</button>
        </div>
        <div>
            <label>&nbsp;</label>
            <button id="downloadAllBtn" disabled>Tout télécharger (.ZIP)</button>
        </div>
    </div>

    <canvas id="canvas-source"></canvas>
    <div id="preview-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const imageInput = document.getElementById('imageInput');
        const extractBtn = document.getElementById('extractBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const previewContainer = document.getElementById('preview-container');
        const sourceCanvas = document.getElementById('canvas-source');
        const sourceCtx = sourceCanvas.getContext('2d');

        const splitMode = document.getElementById('splitMode');
        const pixelControls = document.getElementById('pixelControls');
        const inputCols = document.getElementById('cols');
        const inputRows = document.getElementById('rows');
        const inputSpriteW = document.getElementById('spriteW');
        const inputSpriteH = document.getElementById('spriteH');
        const trimSelect = document.getElementById('trimMode');
        const greenSelect = document.getElementById('greenMode');

        let loadedImage = null;
        let extractedSprites = [];

        splitMode.addEventListener('change', () => {
            pixelControls.style.display = (splitMode.value === 'pixel') ? 'flex' : 'none';
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    loadedImage = img;
                    sourceCanvas.width = img.width;
                    sourceCanvas.height = img.height;
                    sourceCtx.clearRect(0, 0, img.width, img.height);
                    sourceCtx.drawImage(img, 0, 0);
                    
                    extractBtn.disabled = false;
                    previewContainer.innerHTML = `<p style="color:#2ecc71;">Image chargée (${img.width}x${img.height} px).</p>`;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Supprime le vert pur ET neutralise la frange/contour vert sur les bords
        function removeGreenAndSpill(canvas) {
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // 1. Suppression complète des pixels de fond vert (fond principal)
                if (g > 90 && g > r * 1.15 && g > b * 1.15) {
                    data[i + 3] = 0; // Transparence totale
                } 
                // 2. Traitement Anti-Frange (Despill) sur les contours semi-verts résiduels
                else if (g > r || g > b) {
                    // On plafonne le canal vert à la valeur maximale entre Rouge et Bleu
                    const maxOther = Math.max(r, b);
                    if (g > maxOther) {
                        data[i + 1] = maxOther; // Réduit le vert pour éliminer la lueur verte sur le bord
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
            return canvas;
        }

        // Rogne la zone vide
        function cropEmpty(canvas) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            let minX = w, minY = h, maxX = 0, maxY = 0;
            let found = false;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const alpha = data[idx + 3];

                    if (alpha > 10) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }

            if (!found) return canvas;

            const cropW = maxX - minX + 1;
            const cropH = maxY - minY + 1;

            const cropped = document.createElement('canvas');
            cropped.width = cropW;
            cropped.height = cropH;
            cropped.getContext('2d').drawImage(canvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);
            return cropped;
        }

        extractBtn.addEventListener('click', () => {
            if (!loadedImage) return;

            previewContainer.innerHTML = '';
            extractedSprites = [];

            const cols = parseInt(inputCols.value);
            const rows = parseInt(inputRows.value);
            const shouldTrim = trimSelect.value === 'true';
            const shouldRemoveGreen = greenSelect.value === 'true';

            let tileW = (splitMode.value === 'pixel') ? parseInt(inputSpriteW.value) : (loadedImage.width / cols);
            let tileH = (splitMode.value === 'pixel') ? parseInt(inputSpriteH.value) : (loadedImage.height / rows);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * tileW;
                    const y = r * tileH;

                    if (x >= loadedImage.width || y >= loadedImage.height) continue;

                    let workCanvas = document.createElement('canvas');
                    workCanvas.width = tileW;
                    workCanvas.height = tileH;
                    let workCtx = workCanvas.getContext('2d');

                    workCtx.drawImage(loadedImage, x, y, tileW, tileH, 0, 0, tileW, tileH);

                    // 1. Suppression du fond vert + traitement du contour (Despill)
                    if (shouldRemoveGreen) {
                        workCanvas = removeGreenAndSpill(workCanvas);
                    }

                    // 2. Rognage si sélectionné
                    if (shouldTrim) {
                        workCanvas = cropEmpty(workCanvas);
                    }

                    const filename = `sprite_${r + 1}_${c + 1}.png`;
                    
                    workCanvas.toBlob((blob) => {
                        extractedSprites.push({ name: filename, blob: blob });

                        const card = document.createElement('div');
                        card.className = 'sprite-card';
                        
                        workCanvas.style.maxHeight = '90px';
                        workCanvas.style.maxWidth = '120px';
                        
                        const label = document.createElement('div');
                        label.style.fontSize = '11px';
                        label.style.marginBottom = '5px';
                        label.style.color = '#aaa';
                        label.innerText = `${workCanvas.width}x${workCanvas.height}px`;

                        const dlBtn = document.createElement('button');
                        dlBtn.innerText = 'Télécharger';
                        dlBtn.onclick = () => {
                            const link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            link.download = filename;
                            link.click();
                        };

                        card.appendChild(label);
                        card.appendChild(workCanvas);
                        card.appendChild(dlBtn);
                        previewContainer.appendChild(card);
                    }, 'image/png');
                }
            }

            downloadAllBtn.disabled = false;
        });

        downloadAllBtn.addEventListener('click', async () => {
            if (extractedSprites.length === 0) return;

            const zip = new JSZip();
            const folder = zip.folder("sprites_clean");

            extractedSprites.forEach((sprite) => {
                folder.file(sprite.name, sprite.blob);
            });

            downloadAllBtn.innerText = "Génération du ZIP...";
            downloadAllBtn.disabled = true;

            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "sprites_clean.zip";
            link.click();

            downloadAllBtn.innerText = "Tout télécharger (.ZIP)";
            downloadAllBtn.disabled = false;
        });
    </script>

</body>
</html>
