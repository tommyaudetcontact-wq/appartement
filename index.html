<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Tasks - Appartement</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root {
            --brawl-yellow: #FFF200;
            --brawl-purple: #240046;
            --brawl-blue: #00A6FF;
            --brawl-pink: #FF007F;
            --brawl-green: #10D010;
        }
        *, *::before, *::after { box-sizing: border-box; }
        
        body, html {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle, #2c0b5e 0%, #120326 100%);
            color: #fff;
            margin: 0; padding: 0; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            width: 100vw; height: 100vh;
        }
        .brawl-font { font-family: 'Luckiest Guy', cursive; -webkit-text-stroke: 1.5px #000; text-shadow: 2px 2px 0px #000; }
        
        /* ÉCRAN DE LOGIN */
        .login-container {
            max-width: 450px;
            margin: 8vh auto;
            background: rgba(0, 0, 0, 0.65);
            border: 6px solid #000;
            border-radius: 25px;
            box-shadow: 0px 15px 0px rgba(0,0,0,0.4);
            touch-action: auto;
        }

        #game-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #111;
            touch-action: none;
        }

        canvas { display: block; width: 100vw; height: 100vh; background: #1e1e1e; }

        /* HUD BESOINS MOBILE - EN HAUT À GAUCHE */
        #sims-hud {
            position: absolute; top: 10px; left: 10px;
            background: rgba(10, 5, 25, 0.85);
            border: 2px solid #000; border-radius: 12px;
            padding: 6px 10px; box-shadow: 0px 4px 0px #000;
            z-index: 15; width: 130px; pointer-events: none;
        }
        .need-bar-container {
            background: #222; border: 1px solid #000; border-radius: 4px;
            height: 7px; position: relative; overflow: hidden; margin-bottom: 3px;
        }
        .need-bar-fill { height: 100%; width: 100%; transition: width 0.2s linear; }
        .need-label { font-size: 0.6rem; font-weight: 900; margin-bottom: 1px; display: flex; justify-content: space-between; }

        /* BOUTON ACTION CONTEXTUEL - DÉPLACÉ EN BAS AU-DESSUS DU JOYSTICK */
        #interaction-prompt {
            position: absolute; 
            bottom: calc(150px + env(safe-area-inset-bottom, 0px)); 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 25; 
            display: none;
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            pointer-events: auto;
        }
        .action-progress-container {
            width: 160px; height: 10px; background: #111;
            border: 2px solid var(--brawl-yellow); border-radius: 8px;
            overflow: hidden; display: none;
        }
        .action-progress-fill { height: 100%; width: 0%; background: var(--brawl-green); transition: width 0.05s linear; }

        /* MENUS BOUTONS HAUT DROITE RESPONSIVE */
        .top-right-menu {
            position: absolute; top: 10px; right: 10px;
            z-index: 20; display: flex; gap: 4px; align-items: center;
            pointer-events: auto; flex-wrap: wrap; justify-content: flex-end;
            max-width: calc(100vw - 150px);
        }
        .brawl-btn {
            font-family: 'Luckiest Guy', cursive; color: white !important;
            text-shadow: 2px 2px 0px #000; border: 2px solid #000;
            border-radius: 8px; box-shadow: 0px 3px 0px #000;
            font-size: 0.75rem; padding: 5px 8px;
            white-space: nowrap;
        }
        .brawl-btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-pink { background-color: var(--brawl-pink); }
        .btn-yellow { background-color: var(--brawl-yellow); color: #000 !important; text-shadow: none; }
        .btn-green { background-color: var(--brawl-green); }
        .btn-blue { background-color: var(--brawl-blue); }

        /* JOYSTICK MOBILE REHAUSSÉ POUR ÊTRE 100% VISIBLE */
        #joystick-container {
            position: absolute; 
            width: 100px; height: 100px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            z-index: 20; touch-action: none; pointer-events: auto;
        }

        /* Positionnement Portrait vs Paysage */
        @media (orientation: portrait) { 
            #joystick-container { 
                bottom: calc(40px + env(safe-area-inset-bottom, 0px)); 
                left: 50%; 
                transform: translateX(-50%); 
            } 
        }
        @media (orientation: landscape) { 
            #joystick-container { 
                bottom: calc(30px + env(safe-area-inset-bottom, 0px)); 
                left: 30px; 
                transform: none; 
            } 
        }

        #joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 44px; height: 45px; 
            margin-top: -22px; margin-left: -22px;
            border-radius: 50%; background: var(--brawl-blue); border: 2px solid #fff;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* CONTRÔLES PLACEMENT MEUBLE */
        #editor-controls-hud {
            position: absolute; top: 80px; left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 5, 25, 0.95); border: 2px solid var(--brawl-yellow);
            border-radius: 12px; padding: 6px 10px; display: none; gap: 6px;
            z-index: 30; pointer-events: auto; flex-wrap: wrap; justify-content: center;
            width: 90vw; max-width: 320px;
        }

        #editor-panel {
            position: absolute; right: 10px; top: 60px; width: 190px;
            background: rgba(15, 5, 30, 0.95); border: 3px solid var(--brawl-yellow);
            border-radius: 15px; padding: 10px; z-index: 20; display: none; pointer-events: auto;
        }

        /* MODALE BOUTIQUE PLEIN ÉCRAN */
        .shop-modal.modal { padding: 0 !important; }
        .shop-modal .modal-dialog { 
            max-width: 100vw !important; width: 100vw !important; 
            height: 100vh !important; margin: 0 !important; 
        }
        .shop-modal .modal-content {
            height: 100vh !important; border-radius: 0 !important;
            background: radial-gradient(circle, #2a085c 0%, #0f0326 100%);
            border: none; display: flex; flex-direction: column; 
            padding: 12px !important;
            touch-action: pan-y !important;
        }
        
        .category-stack { 
            display: flex; flex-direction: column; gap: 6px; 
            max-height: 30vh; overflow-y: auto; padding: 4px;
            touch-action: pan-y !important;
            -webkit-overflow-scrolling: touch;
        }
        .category-stack .btn { width: 100%; text-align: center; font-size: 1rem; padding: 8px; }

        #shopContainer {
            overflow-y: auto !important;
            touch-action: pan-y !important;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }

        .meuble-card {
            position: relative; background: rgba(0, 0, 0, 0.6);
            border: 3px solid #000; border-radius: 12px; padding: 8px;
            cursor: pointer; height: 100%; display: flex; flex-direction: column; justify-content: space-between;
        }
        .meuble-card.item-locked { border-color: var(--brawl-pink); background: rgba(30, 0, 20, 0.7); }
        .lock-badge {
            position: absolute; top: 4px; right: 4px; background: var(--brawl-pink); color: white;
            font-family: 'Luckiest Guy', cursive; padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; border: 1px solid #000;
        }
        .meuble-img-preview { max-width: 100%; height: 55px; object-fit: contain; display: block; margin: 0 auto 4px auto; }
    </style>
</head>

    <!-- CONFIGURATION APPS SCRIPT -->
    <script>
        const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzKgKRkfVyQuNCrc0T13iH1orPFeWIZAK4kB_emnRFimN-ae_HzISIqUzZ_g1aWgPwHjg/exec";

        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            let savedUser = localStorage.getItem('brawlUser');
            if (savedUser) {
                currentUser = savedUser;
                demarrerPartieAppartement();
            } else {
                chargerMembresPourSelect();
            }
        });

        function chargerMembresPourSelect() {
            fetch(`${APPS_SCRIPT_WEBAPP_URL}?action=getMembres`)
                .then(res => res.json())
                .then(membres => {
                    let select = document.getElementById('usernameSelect');
                    select.innerHTML = '<option value="">-- Choisis ton nom --</option>';
                    if (Array.isArray(membres)) {
                        membres.forEach(m => {
                            let name = m.Nom || m;
                            if (name && name !== 'Admin') {
                                select.innerHTML += `<option value="${name}">${name}</option>`;
                            }
                        });
                    }
                })
                .catch(err => {
                    document.getElementById('loginError').innerText = "Erreur de connexion au serveur.";
                });
        }

        function handleLoginAppartement() {
            let selected = document.getElementById('usernameSelect').value;
            if (!selected) {
                document.getElementById('loginError').innerText = "Veuillez sélectionner un membre.";
                return;
            }

            currentUser = selected;
            localStorage.setItem('brawlUser', currentUser);
            localStorage.setItem('brawlRole', 'joueur');

            demarrerPartieAppartement();
        }

        function demarrerPartieAppartement() {
            document.getElementById('loginPage').classList.add('d-none');
            document.getElementById('game-wrapper').classList.remove('d-none');

            if (typeof initialiserReseauApartment === 'function') {
                initialiserReseauApartment();
            }
            requestAnimationFrame(gameLoop);
        }

        function retournerAuMenuPrincipal() {
            window.location.href = "https://tommyaudetcontact-wq.github.io/brawlTasks2.0/";
        }
    </script>

    <!-- MOTEUR DE JEU -->
    <script>
        const GITHUB_USERNAME = "tommyaudetcontact-wq";
        const REPO_SPRITES = "appartements-assets";
        const ASSETS_BASE_URL = `https://${GITHUB_USERNAME}.github.io/${REPO_SPRITES}/`;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let imagesCache = {};

        function chargerImage(url) {
            if (!url) return null;
            if (imagesCache[url]) return imagesCache[url];
            let img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = url;
            imagesCache[url] = img;
            return img;
        }

        const PIECES = {
            chambre: { id: 'chambre', nom: 'Chambre', x: 10, y: 10, w: 390, h: 240, colorDefault: '#b0bec5' },
            cuisine: { id: 'cuisine', nom: 'Cuisine', x: 410, y: 10, w: 380, h: 240, colorDefault: '#ffccbc' },
            salon:   { id: 'salon', nom: 'Salon', x: 10, y: 260, w: 540, h: 330, colorDefault: '#d7ccc8' },
            sdb:     { id: 'sdb', nom: 'Salle de Bain', x: 560, y: 260, w: 230, h: 330, colorDefault: '#b2ebf2' }
        };

        let planchersPieces = { chambre: null, cuisine: null, salon: null, sdb: null };
        let meublesPlaces = [];
        let curseurMouse = { x: 400, y: 300 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let player = {
            x: 200, y: 400, radius: 14, speed: 3.2,
            dir: 'down', moving: false, animTimer: 0, color: '#00a6ff'
        };

        let otherPlayers = {};

        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickVector = { x: 0, y: 0 };
        let joystickActive = false;

        function handleTouchJoystick(e) {
            let touch = e.touches[0];
            if (!touch) return;

            let rect = joystickContainer.getBoundingClientRect();
            let centerX = rect.left + rect.width / 2;
            let centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            let dist = Math.hypot(dx, dy);
            let maxRadius = 38;

            if (dist > 0) {
                let clampedDist = Math.min(dist, maxRadius);
                let angle = Math.atan2(dy, dx);
                let knobX = Math.cos(angle) * clampedDist;
                let knobY = Math.sin(angle) * clampedDist;

                joystickKnob.style.transform = `translate(${knobX}px, ${knobY}px)`;
                joystickVector.x = dx / dist;
                joystickVector.y = dy / dist;
                joystickActive = true;
            }
        }

        function resetJoystick() {
            joystickKnob.style.transform = `translate(0px, 0px)`;
            joystickVector = { x: 0, y: 0 };
            joystickActive = false;
        }

        joystickContainer.addEventListener('touchstart', handleTouchJoystick, { passive: false });
        joystickContainer.addEventListener('touchmove', handleTouchJoystick, { passive: false });
        joystickContainer.addEventListener('touchend', resetJoystick);
        joystickContainer.addEventListener('touchcancel', resetJoystick);

        let isDraggingMeuble = false;

        function ObtenirCoordonneesMonde(clientX, clientY) {
            return {
                x: player.x + (clientX - canvas.width / 2),
                y: player.y + (clientY - canvas.height / 2)
            };
        }

        function demarrerDrag(clientX, clientY) {
            if (!modeEditeur || !peutEditer()) return;

            let pos = ObtenirCoordonneesMonde(clientX, clientY);

            if (meubleEnModePlacement) {
                curseurMouse.x = pos.x;
                curseurMouse.y = pos.y;
                isDraggingMeuble = true;
            } else {
                if (verifierSelectionMeubleExistant(pos.x, pos.y)) {
                    isDraggingMeuble = true;
                } else if (texturePlancherSelectionnee) {
                    let piece = obtenirPieceSurvolee(pos.x, pos.y);
                    if (piece) {
                        pieceCibleEdition = piece;
                        document.getElementById('editor-target-name').innerText = "Pièce : " + piece.nom;
                    }
                }
            }
        }

        function deplacerDrag(clientX, clientY) {
            if (isDraggingMeuble && meubleEnModePlacement) {
                let pos = ObtenirCoordonneesMonde(clientX, clientY);
                curseurMouse.x = pos.x;
                curseurMouse.y = pos.y;
            }
        }

        function arreterDrag() { isDraggingMeuble = false; }

        canvas.addEventListener('mousedown', (e) => demarrerDrag(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => deplacerDrag(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', arreterDrag);

        canvas.addEventListener('touchstart', (e) => {
            if (e.target === canvas && e.touches.length > 0) {
                demarrerDrag(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (isDraggingMeuble && e.touches.length > 0) {
                deplacerDrag(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', arreterDrag);

        let besoins = { faim: 100, vessie: 100, energie: 100, hygiene: 100 };
        let interactionActive = null; 
        let actionEnCours = false;
        let tempsActionDebut = 0;
        let dureeActionTotale = 3000;

        function degraderBesoins(deltaTime) {
            if (actionEnCours && interactionActive === 'manger') return;

            besoins.faim = Math.max(0, besoins.faim - (100 / 600) * deltaTime);
            besoins.vessie = Math.max(0, besoins.vessie - (100 / 300) * deltaTime);
            besoins.energie = Math.max(0, besoins.energie - (100 / 900) * deltaTime);
            besoins.hygiene = Math.max(0, besoins.hygiene - (100 / 900) * deltaTime);

            if (actionEnCours) {
                if (interactionActive === 'toilette') besoins.vessie = Math.min(100, besoins.vessie + (2.0 * deltaTime));
                if (interactionActive === 'dormir') besoins.energie = Math.min(100, besoins.energie + (2.0 * deltaTime));
                if (interactionActive === 'douche') besoins.hygiene = Math.min(100, besoins.hygiene + (2.0 * deltaTime));
            }

            mettreAJourHUD();
        }

        function mettreAJourHUD() {
            document.getElementById('valFaim').innerText = Math.round(besoins.faim) + "%";
            document.getElementById('barFaim').style.width = besoins.faim + "%";
            document.getElementById('valVessie').innerText = Math.round(besoins.vessie) + "%";
            document.getElementById('barVessie').style.width = besoins.vessie + "%";
            document.getElementById('valEnergie').innerText = Math.round(besoins.energie) + "%";
            document.getElementById('barEnergie').style.width = besoins.energie + "%";
            document.getElementById('valHygiene').innerText = Math.round(besoins.hygiene) + "%";
            document.getElementById('barHygiene').style.width = besoins.hygiene + "%";
        }

        function detecterInteractions() {
            if (modeEditeur) {
                if (actionEnCours) quitterAction();
                document.getElementById('interaction-prompt').style.display = 'none';
                return;
            }

            if (actionEnCours) {
                document.getElementById('interaction-prompt').style.display = 'flex';
                return;
            }

            let interactionTrouvee = null;

            for (let m of meublesPlaces) {
                let dist = Math.hypot(player.x - m.x, player.y - m.y);
                let rayonInteraction = Math.max(45, (m.w * (m.scale || 1)) / 2 + 25);

                if (dist < rayonInteraction) {
                    let typeClean = (m.type || '').toLowerCase();

                    if (typeClean === 'four' || typeClean === 'fours') interactionTrouvee = { type: 'manger', label: 'CUISINER 🍳' };
                    else if (typeClean === 'lits') interactionTrouvee = { type: 'dormir', label: 'DORMIR 🛏️' };
                    else if (typeClean === 'toilettes') interactionTrouvee = { type: 'toilette', label: 'TOILETTE 🚽' };
                    else if (typeClean === 'douche' || typeClean === 'douches') interactionTrouvee = { type: 'douche', label: 'DOUCHE 🚿' };

                    if (interactionTrouvee) break;
                }
            }

            const promptBox = document.getElementById('interaction-prompt');
            const btn = document.getElementById('btnInteraction');

            if (interactionTrouvee) {
                interactionActive = interactionTrouvee.type;
                btn.innerText = interactionTrouvee.label;
                btn.className = "btn brawl-btn btn-green";
                promptBox.style.display = 'flex';
            } else {
                interactionActive = null;
                promptBox.style.display = 'none';
            }
        }

        function quitterAction() {
            actionEnCours = false;
            const progressBox = document.getElementById('actionProgressBox');
            const progressBar = document.getElementById('actionProgressBar');
            if (progressBox) progressBox.style.display = 'none';
            if (progressBar) progressBar.style.width = "0%";
            detecterInteractions();
        }

        function executerInteraction() {
            if (actionEnCours) {
                quitterAction();
                return;
            }

            if (!interactionActive) return;

            if (interactionActive === 'manger') {
                actionEnCours = true;
                tempsActionDebut = performance.now();
                document.getElementById('actionProgressBox').style.display = 'block';
                
                const btn = document.getElementById('btnInteraction');
                btn.innerText = "ARRÊTER ❌";
                btn.className = "btn brawl-btn btn-pink";
            } else {
                actionEnCours = true;
                const btn = document.getElementById('btnInteraction');
                btn.innerText = "QUITTER ❌";
                btn.className = "btn brawl-btn btn-pink";
            }
        }

        function gererProgressionAction(maintenant) {
            if (!actionEnCours || interactionActive !== 'manger') return;

            let ecoule = maintenant - tempsActionDebut;
            let ratio = Math.min(1.0, ecoule / dureeActionTotale);

            document.getElementById('actionProgressBar').style.width = (ratio * 100) + "%";

            if (ratio >= 1.0) {
                besoins.faim = Math.min(100, besoins.faim + (100 / 3));
                quitterAction();
            }
        }

        const murs = [
            {x: 0, y: 0, w: 800, h: 10}, {x: 0, y: 0, w: 10, h: 600},
            {x: 790, y: 0, w: 10, h: 600}, {x: 0, y: 590, w: 800, h: 10},
            {x: 10, y: 250, w: 320, h: 10}, {x: 430, y: 250, w: 360, h: 10},
            {x: 400, y: 10, w: 10, h: 90}, {x: 400, y: 180, w: 10, h: 70},
            {x: 550, y: 260, w: 10, h: 90}, {x: 550, y: 430, w: 10, h: 160}
        ];

        function obtenirPieceSurvolee(x, y) {
            for (let k in PIECES) {
                let p = PIECES[k];
                if (x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h) return p;
            }
            return null;
        }

        function checkCollision(nx, ny) {
            for (let m of murs) {
                if (nx + player.radius > m.x && nx - player.radius < m.x + m.w &&
                    ny + player.radius > m.y && ny - player.radius < m.y + m.h) return true;
            }
            return false;
        }

        function dessinerSolPiece(piece) {
            let textData = planchersPieces[piece.id];

            if (texturePlancherSelectionnee && pieceCibleEdition && pieceCibleEdition.id === piece.id) {
                let val = parseFloat(document.getElementById('tileSizeSlider').value) / 100.0;
                textData = { url: texturePlancherSelectionnee, scale: val };
            }

            if (textData) {
                let img = chargerImage(textData.url);
                if (img && img.complete && img.naturalWidth !== 0) {
                    let pattern = ctx.createPattern(img, 'repeat');
                    let scaleFactor = (200 / img.naturalWidth) * textData.scale;
                    
                    let matrix = new DOMMatrix();
                    matrix = matrix.scale(scaleFactor, scaleFactor);
                    pattern.setTransform(matrix);

                    ctx.fillStyle = pattern;
                    ctx.fillRect(piece.x, piece.y, piece.w, piece.h);
                    return;
                }
            }

            ctx.fillStyle = piece.colorDefault;
            ctx.fillRect(piece.x, piece.y, piece.w, piece.h);
        }

        function dessinerAppartement() {
            Object.keys(PIECES).forEach(k => dessinerSolPiece(PIECES[k]));

            if (modeEditeur && texturePlancherSelectionnee) {
                let pieceVisée = obtenirPieceSurvolee(curseurMouse.x, curseurMouse.y);
                if (pieceVisée) {
                    ctx.save();
                    ctx.fillStyle = "rgba(0, 166, 255, 0.2)";
                    ctx.fillRect(pieceVisée.x, pieceVisée.y, pieceVisée.w, pieceVisée.h);
                    ctx.strokeStyle = (pieceCibleEdition && pieceCibleEdition.id === pieceVisée.id) ? "#10D010" : "#00A6FF";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(pieceVisée.x, pieceVisée.y, pieceVisée.w, pieceVisée.h);
                    ctx.restore();
                }
            }

            ctx.fillStyle = "#3e2723";
            murs.forEach(m => ctx.fillRect(m.x, m.y, m.w, m.h));

            meublesPlaces.forEach(m => {
                let img = chargerImage(m.url);
                let curW = m.w * (m.scale || 1);
                let curH = m.h * (m.scale || 1);

                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate((m.rotation || 0) * Math.PI / 180);

                if (img && img.complete && img.naturalWidth !== 0) {
                    ctx.drawImage(img, -curW / 2, -curH / 2, curW, curH);
                } else {
                    ctx.fillStyle = "#ff7043"; 
                    ctx.fillRect(-curW / 2, -curH / 2, curW, curH);
                }
                ctx.restore();
            });

            if (meubleEnModePlacement) {
                let curW = meubleEnModePlacement.w * meubleEnModePlacement.scale;
                let curH = meubleEnModePlacement.h * meubleEnModePlacement.scale;

                ctx.save();
                ctx.translate(curseurMouse.x, curseurMouse.y);
                ctx.rotate(meubleEnModePlacement.rotation * Math.PI / 180);
                ctx.globalAlpha = 0.8;

                let img = chargerImage(meubleEnModePlacement.url);
                if (img && img.complete && img.naturalWidth !== 0) {
                    ctx.drawImage(img, -curW / 2, -curH / 2, curW, curH);
                } else {
                    ctx.fillStyle = "#10D010"; 
                    ctx.fillRect(-curW / 2, -curH / 2, curW, curH);
                }

                ctx.strokeStyle = "#FFF200"; 
                ctx.lineWidth = 3;
                ctx.strokeRect(-curW / 2, -curH / 2, curW, curH);
                ctx.restore();
            }
        }

        function dessinerPersonnage(p, name, isOther = false) {
            ctx.save();
            ctx.translate(p.x, p.y);

            let bounceY = p.moving ? Math.sin(p.animTimer * 0.2) * 3 : 0;
            ctx.beginPath(); ctx.ellipse(0, 16, 14, 6, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fill();

            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.roundRect(-10, -10 + bounceY, 20, 22, 5); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = "#000"; ctx.stroke();

            ctx.beginPath(); ctx.arc(0, -16 + bounceY, 10, 0, Math.PI * 2);
            ctx.fillStyle = "#ffdbac"; ctx.fill(); ctx.stroke();

            ctx.restore();

            if (isOther && p.actionEnCours && p.interactionType) {
                let icone = "💬";
                if (p.interactionType === 'manger') icone = "🍳";
                else if (p.interactionType === 'dormir') icone = "💤";
                else if (p.interactionType === 'toilette') icone = "🚽";
                else if (p.interactionType === 'douche') icone = "🚿";

                ctx.fillStyle = "#FFF200";
                ctx.font = "bold 14px Montserrat";
                ctx.textAlign = "center";
                ctx.fillText(icone, p.x, p.y - 48);
            }

            ctx.fillStyle = "#000"; ctx.font = "bold 10px Montserrat"; ctx.textAlign = "center";
            ctx.fillText(name.toUpperCase(), p.x, p.y - 34);
        }

        let lastTime = performance.now();
        let lastSendTime = 0;

        function gameLoop(time) {
            let deltaTime = (time - lastTime) / 1000;
            lastTime = time;

            player.moving = false;
            let dx = 0, dy = 0;

            if (joystickActive && !actionEnCours && !meubleEnModePlacement && !isDraggingMeuble) {
                dx = joystickVector.x;
                dy = joystickVector.y;
            }

            if (dx !== 0 || dy !== 0) {
                if (actionEnCours) quitterAction();

                player.moving = true;
                player.animTimer++;
                let moveStep = player.speed;

                let nextX = player.x + dx * moveStep;
                let nextY = player.y + dy * moveStep;

                if (!checkCollision(nextX, player.y)) player.x = nextX;
                if (!checkCollision(player.x, nextY)) player.y = nextY;
            } else {
                player.animTimer = 0;
            }

            degraderBesoins(deltaTime);
            detecterInteractions();
            gererProgressionAction(time);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

            dessinerAppartement();

            Object.keys(otherPlayers).forEach(id => {
                let op = otherPlayers[id];
                if (op.moving) op.animTimer = (op.animTimer || 0) + 1;
                dessinerPersonnage(op, op.username, true);
            });

            if (currentUser) {
                dessinerPersonnage(player, currentUser, false);
            }

            ctx.restore();

            if (time > lastSendTime + 40) {
                let payload = {
                    type: 'POS_UPDATE',
                    username: currentUser,
                    x: Math.round(player.x),
                    y: Math.round(player.y),
                    color: player.color,
                    actionEnCours: actionEnCours,
                    interactionType: interactionActive,
                    peerId: myPeer ? myPeer.id : null
                };

                envoyerDonneesMulti(payload);
                lastSendTime = time;
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
