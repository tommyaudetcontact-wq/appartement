<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Tasks - Appartement</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root {
            --brawl-yellow: #FFF200;
            --brawl-purple: #240046;
            --brawl-blue: #00A6FF;
            --brawl-pink: #FF007F;
            --brawl-green: #10D010;
        }
        *, *::before, *::after { box-sizing: border-box; }
        
        body, html {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle, #2c0b5e 0%, #120326 100%);
            color: #fff;
            margin: 0; padding: 0; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            width: 100vw; height: 100vh;
        }
        .brawl-font { font-family: 'Luckiest Guy', cursive; -webkit-text-stroke: 1.5px #000; text-shadow: 2px 2px 0px #000; }
        
        /* LOGIN */
        .login-container {
            max-width: 450px;
            margin: 8vh auto;
            background: rgba(0, 0, 0, 0.65);
            border: 6px solid #000;
            border-radius: 25px;
            box-shadow: 0px 15px 0px rgba(0,0,0,0.4);
            touch-action: auto;
        }

        #game-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #111;
            touch-action: none;
        }

        canvas { 
            display: block; width: 100vw; height: 100vh; background: #1e1e1e; 
            image-rendering: crisp-edges; image-rendering: -webkit-optimize-contrast;
        }

        /* HUD BESOINS & AFFICHAGE SOLDE */
        #sims-hud {
            position: absolute; top: 10px; left: 10px;
            background: rgba(10, 5, 25, 0.92);
            border: 2.5px solid #000; border-radius: 14px;
            padding: 10px 12px; box-shadow: 0px 4px 0px #000;
            z-index: 15; width: 165px; pointer-events: none;
        }
        
        .money-badge-hud {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--brawl-green);
            border-radius: 10px;
            padding: 5px 8px;
            margin-bottom: 8px;
            font-size: 1rem;
            color: #10D010 !important;
            text-shadow: 1px 1px 0px #000;
            text-align: center;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .need-bar-container {
            background: #111; border: 1.5px solid #000; border-radius: 5px;
            height: 10px; position: relative; overflow: hidden; margin-bottom: 6px;
        }
        .need-bar-fill { height: 100%; width: 100%; transition: width 0.2s linear, background-color 0.3s; }
        .need-label { font-size: 0.75rem; font-weight: 900; margin-bottom: 2px; display: flex; justify-content: space-between; text-shadow: 1px 1px 0px #000; }

        @keyframes fadeRedAlert {
            0% { background-color: #ff0055; opacity: 1.0; }
            50% { background-color: #990022; opacity: 0.4; }
            100% { background-color: #ff0055; opacity: 1.0; }
        }
        .need-danger-alert {
            animation: fadeRedAlert 1s infinite !important;
        }

        /* BOUTON D'ACTION CONTEXTUEL */
        #interaction-prompt {
            position: absolute; 
            bottom: calc(165px + env(safe-area-inset-bottom, 0px)); 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 25; 
            display: none;
            flex-direction: column; 
            align-items: center; 
            gap: 6px;
            pointer-events: auto;
        }
        .action-progress-container {
            width: 190px; height: 14px; background: #111;
            border: 2px solid var(--brawl-yellow); border-radius: 8px;
            overflow: hidden; display: none;
        }
        .action-progress-fill { height: 100%; width: 0%; background: var(--brawl-green); transition: width 0.05s linear; }

        /* BOUTONS HUD HAUT DROITE */
        .top-right-menu {
            position: absolute; top: 10px; right: 10px;
            z-index: 20; display: flex; gap: 6px; align-items: center;
            pointer-events: auto; flex-wrap: wrap; justify-content: flex-end;
            max-width: calc(100vw - 180px);
        }
        .brawl-btn {
            font-family: 'Luckiest Guy', cursive; color: white !important;
            text-shadow: 2px 2px 0px #000; border: 3px solid #000;
            border-radius: 12px; box-shadow: 0px 4px 0px #000;
            font-size: 0.95rem; padding: 8px 14px;
            white-space: nowrap;
        }
        .brawl-btn:active { transform: translateY(2px); box-shadow: 0px 2px 0px #000; }
        .btn-pink { background-color: var(--brawl-pink); }
        .btn-yellow { background-color: var(--brawl-yellow); color: #000 !important; text-shadow: none; }
        .btn-green { background-color: var(--brawl-green); }
        .btn-blue { background-color: var(--brawl-blue); }

        /* JOYSTICK */
        #joystick-container {
            position: absolute; 
            width: 105px; height: 105px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            z-index: 20; touch-action: none; pointer-events: auto;
        }

        @media (orientation: portrait) { 
            #joystick-container { 
                bottom: calc(55px + env(safe-area-inset-bottom, 0px)); 
                left: 50%; 
                transform: translateX(-50%); 
            } 
        }
        @media (orientation: landscape) { 
            #joystick-container { 
                bottom: calc(40px + env(safe-area-inset-bottom, 0px)); 
                left: 35px; 
                transform: none; 
            } 
        }

        #joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 46px; height: 46px; 
            margin-top: -23px; margin-left: -23px;
            border-radius: 50%; background: var(--brawl-blue); border: 2px solid #fff;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.5); pointer-events: none;
        }

        #editor-controls-hud {
            position: absolute; top: 85px; left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 5, 25, 0.95); border: 2px solid var(--brawl-yellow);
            border-radius: 12px; padding: 6px 10px; display: none; gap: 6px;
            z-index: 30; pointer-events: auto; flex-wrap: wrap; justify-content: center;
            width: 90vw; max-width: 330px;
        }

        #editor-panel {
            position: absolute; right: 10px; top: 65px; width: 190px;
            background: rgba(15, 5, 30, 0.95); border: 3px solid var(--brawl-yellow);
            border-radius: 15px; padding: 10px; z-index: 20; display: none; pointer-events: auto;
        }

        /* BOUTIQUE PLEIN ÉCRAN A 2 ÉCRANS */
        .shop-modal.modal { padding: 0 !important; }
        .shop-modal .modal-dialog { 
            max-width: 100vw !important; width: 100vw !important; 
            height: 100vh !important; margin: 0 !important; 
        }
        .shop-modal .modal-content {
            height: 100vh !important; border-radius: 0 !important;
            background: radial-gradient(circle, #2a085c 0%, #0f0326 100%);
            border: none; display: flex; flex-direction: column; 
            padding: 14px !important;
            touch-action: pan-y !important;
        }

        .meuble-card {
            position: relative; background: rgba(0, 0, 0, 0.6);
            border: 3px solid #000; border-radius: 12px; padding: 8px;
            cursor: pointer; height: 100%; display: flex; flex-direction: column; justify-content: space-between;
        }
        .meuble-card.item-locked { border-color: var(--brawl-pink); background: rgba(30, 0, 20, 0.7); }
        .lock-badge {
            position: absolute; top: 4px; right: 4px; background: var(--brawl-pink); color: white;
            font-family: 'Luckiest Guy', cursive; padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; border: 1px solid #000;
        }
        .meuble-img-preview { max-width: 100%; height: 60px; object-fit: contain; display: block; margin: 0 auto 4px auto; }
        
        .skin-preview-img {
            height: 110px !important;
            max-height: 110px !important;
            transform: scale(1.15);
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="container">
        <div class="login-container p-4 text-center animate__animated animate__zoomIn">
            <h1 class="brawl-font text-warning mb-2" style="font-size: 2.8rem;">BRAWL TASKS</h1>
            <h3 class="brawl-font text-light mb-4" style="font-size: 1.2rem;">🏠 Mon Appartement</h3>
            
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">Qui es-tu ?</label>
                <select id="usernameSelect" class="form-select form-select-lg bg-dark text-white border-secondary">
                    <option value="">Chargement des membres...</option>
                </select>
            </div>
            
            <button onclick="handleLoginAppartement()" class="btn brawl-btn btn-yellow w-100 py-3 mt-2">ENTRER DANS L'APPARTEMENT !</button>
            <div id="loginError" class="text-danger mt-3 fw-bold"></div>
        </div>
    </div>

    <div id="game-wrapper" class="d-none">
        <canvas id="gameCanvas"></canvas>

        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>

        <div id="sims-hud">
            <div class="money-badge-hud">
                💰 <span id="hudUserMoney">0.00 $</span>
            </div>

            <div class="brawl-font text-warning text-center mb-1" style="font-size: 0.75rem;">MES BESOINS</div>
            <div class="need-label text-info"><span>🍔 Faim</span><span id="valFaim">100%</span></div>
            <div class="need-bar-container"><div id="barFaim" class="need-bar-fill bg-info" style="width: 100%;"></div></div>
            <div class="need-label text-warning"><span>⚡ Énergie</span><span id="valEnergie">100%</span></div>
            <div class="need-bar-container"><div id="barEnergie" class="need-bar-fill bg-warning" style="width: 100%;"></div></div>
            <div class="need-label text-primary"><span>💧 Vessie</span><span id="valVessie">100%</span></div>
            <div class="need-bar-container"><div id="barVessie" class="need-bar-fill bg-primary" style="width: 100%;"></div></div>
            <div class="need-label text-success"><span>✨ Hygiène</span><span id="valHygiene">100%</span></div>
            <div class="need-bar-container"><div id="barHygiene" class="need-bar-fill bg-success" style="width: 100%;"></div></div>
        </div>

        <div id="interaction-prompt">
            <button id="btnInteraction" onclick="executerInteraction()" class="btn brawl-btn btn-green fs-6">
                [E] CUISINER 🍳
            </button>
            <div id="actionProgressBox" class="action-progress-container">
                <div id="actionProgressBar" class="action-progress-fill"></div>
            </div>
        </div>

        <div class="top-right-menu">
            <span id="netRoleBadge" class="badge bg-warning text-dark brawl-font px-2 py-2" style="border: 2px solid #000; font-size: 0.8rem;">MON APPART 🏠</span>
            <button onclick="ouvrirListeJoueursEnLigne()" class="btn brawl-btn btn-green">🌐 JOUEURS</button>
            <button id="btnTogglePermission" onclick="basculerPermissionInvite()" class="btn brawl-btn btn-pink" style="display: none;">🔒 PERMIS : NON</button>
            <button id="btnToggleEditor" onclick="basculerModeEditeur()" class="btn brawl-btn btn-yellow">🛠️ ÉDITEUR</button>
            <button onclick="ouvrirBoutique()" class="btn brawl-btn btn-blue">🛍️ BOUTIQUE</button>
            <button onclick="retournerAuMenuPrincipal()" class="btn brawl-btn btn-pink">🏠 MENU</button>
        </div>

        <div id="editor-controls-hud">
            <button onclick="ajusterTailleMeuble(0.1)" class="btn brawl-btn btn-yellow">🔍 +</button>
            <button onclick="ajusterTailleMeuble(-0.1)" class="btn brawl-btn btn-yellow">🔍 -</button>
            <button onclick="tournerMeuble()" class="btn brawl-btn btn-blue">🔄 Tourner</button>
            <button onclick="supprimerMeubleActif()" class="btn brawl-btn btn-pink">🗑️ Suppr</button>
            <button onclick="validerPlacementMeuble()" class="btn brawl-btn btn-green px-3">✅ Poser</button>
        </div>

        <div id="editor-panel">
            <div class="brawl-font text-warning text-center mb-1 small">🪵 ÉDITEUR SOL</div>
            <div id="editor-target-name" class="text-info text-center fw-bold mb-2 small">Cliquez sur une pièce</div>
            <div class="mb-2 text-center">
                <img id="editor-preview-img" src="" style="max-height: 40px; border: 1px solid #fff; border-radius: 6px;">
            </div>
            <div class="mb-2">
                <input type="range" class="form-range" id="tileSizeSlider" min="1" max="100" value="20" oninput="mettreAJourAperçuSlider()">
            </div>
            <div class="d-flex gap-1">
                <button onclick="appliquerPlancherFinal()" class="btn brawl-btn btn-green w-100 py-1 small">APPLIQUER ✅</button>
                <button onclick="fermerEditeurSol()" class="btn brawl-btn btn-pink py-1 small">❌</button>
            </div>
        </div>
    </div>

    <!-- MODALE BOUTIQUE PLEIN ÉCRAN À 2 ÉCRANS -->
    <div class="modal fade shop-modal" id="shopModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom border-secondary">
                    <div>
                        <h2 class="brawl-font text-warning m-0 fs-3" id="shopTitleHeader">🛍️ BOUTIQUE</h2>
                        <div class="brawl-font text-success fs-6" style="color: #10D010 !important;">💰 Solde : <span id="shopUserMoney">0.00 $</span></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button id="btnRetourCategories" onclick="afficherEcranCategories()" class="btn brawl-btn btn-yellow px-3 py-1 fs-6 d-none">⬅️ CATÉGORIES</button>
                        <button type="button" class="btn brawl-btn btn-pink px-3 py-1 fs-6" data-bs-dismiss="modal">❌ FERMER</button>
                    </div>
                </div>
                
<!-- ÉCRAN 1 : LISTE DES CATÉGORIES -->
                <div id="shopCategoriesScreen" class="flex-grow-1 overflow-auto">
                    <div class="category-stack d-grid gap-2 py-2">
                        <button onclick="ouvrirCategorieBoutique('skins', '🎭 SKINS PERSONNAGES')" class="btn brawl-btn btn-pink fs-5 py-3">🎭 SKINS PERSONNAGES ($30)</button>
                        <button onclick="ouvrirCategorieBoutique('murs', '🧱 PAPIERS PEINTS / MURS')" class="btn brawl-btn btn-blue fs-5 py-3">🧱 PAPIERS PEINTS / MURS</button>
<button onclick="ouvrirCategorieBoutique('Fenetres', '🪟 FENÊTRES')" class="btn brawl-btn btn-green fs-5 py-3">🪟 FENÊTRES</button>                        <button onclick="ouvrirCategorieBoutique('four', '🔥 FOURS & CUISINIÈRES')" class="btn brawl-btn btn-yellow fs-5 py-3">🔥 Fours & Cuisinières</button>
                        <button onclick="ouvrirCategorieBoutique('divant', '🛋️ DIVANS & CANAPÉS')" class="btn brawl-btn btn-yellow fs-5 py-3">🛋️ Divans & Canapés</button>
                        <button onclick="ouvrirCategorieBoutique('lits', '🛏️ LITS')" class="btn brawl-btn btn-green fs-5 py-3">🛏️ Lits</button>
                        <button onclick="ouvrirCategorieBoutique('tables', '🪵 TABLES')" class="btn brawl-btn btn-blue fs-5 py-3">🪵 Tables</button>
                        <button onclick="ouvrirCategorieBoutique('commodes', '🗄️ COMMODES')" class="btn brawl-btn btn-yellow fs-5 py-3">🗄️ Commodes</button>
                        <button onclick="ouvrirCategorieBoutique('comptoirs', '🍳 COMPTOIRS')" class="btn brawl-btn btn-green fs-5 py-3">🍳 Comptoirs</button>
                        <button onclick="ouvrirCategorieBoutique('douche', '🚿 DOUCHES')" class="btn brawl-btn btn-blue fs-5 py-3">🚿 Douches</button>
                        <button onclick="ouvrirCategorieBoutique('toilettes', '🚽 TOILETTES')" class="btn brawl-btn btn-yellow fs-5 py-3">🚽 Toilettes</button>
                        <button onclick="ouvrirCategorieBoutique('évier toilettes', '🚰 ÉVIERS')" class="btn brawl-btn btn-green fs-5 py-3">🚰 Éviers</button>
                        <button onclick="ouvrirCategorieBoutique('plancher', '🎨 PLANCHERS & SOLS')" class="btn brawl-btn btn-blue fs-5 py-3">🎨 Planchers & Sols</button>
                        <button onclick="ouvrirCategorieBoutique('TV', '📺 TÉLÉVISIONS')" class="btn brawl-btn btn-green fs-5 py-3">📺 TV</button>
                        <button onclick="ouvrirCategorieBoutique('plantes', '🪴 PLANTES')" class="btn brawl-btn btn-blue fs-5 py-3">🪴 Plantes</button>
                        <button onclick="ouvrirCategorieBoutique('frigidaire', '🧊 FRIGIDAIRES')" class="btn brawl-btn btn-blue fs-5 py-3">🧊 Frigidaires</button>
                    </div>
                </div>

                <!-- ÉCRAN 2 : LISTE DES ITEMS -->
                <div id="shopItemsScreen" class="flex-grow-1 overflow-auto d-none">
                    <div id="shopContainer" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-2 pt-2">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="onlinePlayersModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border border-warning text-center p-3">
                <h3 class="brawl-font text-warning mb-3">🌐 JOUEURS EN LIGNE</h3>
                <div id="onlinePlayersList" class="mb-3"></div>
                <div class="d-flex gap-2">
                    <button class="btn brawl-btn btn-yellow w-100" onclick="retournerMonAppartement()">🏠 MON APPARTEMENT</button>
                    <button type="button" class="btn brawl-btn btn-pink px-3" data-bs-dismiss="modal">❌</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS EXTERNES -->
    <script src="multijoueurs.js"></script>
    <script src="editeur.js"></script>
    <script src="script.js"></script>
</body>
</html>
